name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libegl1 libgles2 libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-timeout

      - name: Run tests
        run: |
          PYTHONPATH=src xvfb-run --auto-servernum pytest -v --timeout=120 \
            --ignore=tests/test_move_base_control_evaluation.py \
            --ignore=tests/test_hsrb_analytic_ik_solver_ported.py \
            --ignore=tests/test_arm_joint_tracking.py \
            --ignore=tests/test_head_joint_tracking.py
